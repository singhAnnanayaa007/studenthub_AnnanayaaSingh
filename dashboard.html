<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body style="background-color:rgb(177, 217, 241);">

    <!-- NAVBAR-->
    <header>
        <nav>
            <div class="top-row">
                <h1 style="color:rgb(128, 10, 10); font-size:xx-large;"><b>Student Hub</b></h1>
            </div>

            <ul class="nav-lists">
                <li><a href="index.html">Home</a></li>
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="about.html">About</a></li>
            </ul>
        </nav>
    </header>
    <button id="darkToggle" class="dark-btn">Dark Mode</button>

<div class="weather-card">
    <h3>Weather</h3>

    <p id="weatherLocation">Detecting location...</p>
    <p id="weatherTemp">--°C</p>
    <p id="weatherDesc">Loading...</p>
</div>

    <!-- DASHBOARD -->
    <section class="dashboard">
        <h2 style = "color:rgb(128, 10, 10); font-size:large;">Dashboard</h2>

        <div class="dashboard-container">

            <!-- TASK MANAGER -->
            <div class="card">
                <h3>Task Manager</h3>

                <div class="task-input">
                    <input id="taskInput" placeholder="Enter task..." />
                    <button id="addTaskBtn">Add</button>
                </div>

                <ul id="taskList"></ul>
            </div>

            <!-- HABIT TRACKER -->
            <div class="card">
                <h3>Habit Tracker</h3>

                <ul id="habitList"></ul>

                <button id="resetHabitsBtn">Reset Today</button>
            </div>

            <div class="card">
                <h3>Sticky Notes</h3>
                <div class="task-input">
                    <input id="noteTitle" placeholder="Title..." />
                </div>
                <div class="task-input">
                    <input id="noteBody" placeholder="Write note..." />
                    <button id="addNoteBtn">Add</button>
                </div>
                <div id="notesContainer" class="notes-grid"></div>
            </div>

        </div>
    </section>
    <script src="script.js"></script>
    <script src="mode.js"></script>
</body>

<footer>
    <p>2026 StudentHub | Built by Annanayaa Singh :)</p>
</footer>
</html>
